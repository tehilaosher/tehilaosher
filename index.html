<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tehila Osher | AI Jewelry Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;600&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { 
            --gold: #c5a059; --gold-light: #e2c99d; --bg: #fdfbf8; 
            --text: #1a1a1a; --white: #ffffff; --shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        
        body { 
            margin: 0; background: linear-gradient(135deg, #fdfbf8 0%, #f5f0e8 100%);
            color: var(--text); font-family: 'Assistant', sans-serif; overflow-x: hidden;
            transition: direction 0.3s;
        }

        /* כפתור החלפת שפה */
        .lang-switch {
            position: fixed; top: 20px; right: 20px; z-index: 2000;
            background: var(--white); border: 1px solid #ddd; padding: 8px 15px;
            cursor: pointer; font-weight: 600; font-size: 0.8rem; letter-spacing: 1px;
            box-shadow: var(--shadow);
        }

        /* אנימציות */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.8s ease-out forwards; }

        /* דף הבית */
        #home-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 40px 20px; }
        header { margin-bottom: 40px; }
        h1 { font-family: 'Playfair Display'; font-size: clamp(2.5rem, 8vw, 4.5rem); margin: 0; font-weight: 400; }
        .subtitle { letter-spacing: 4px; opacity: 0.6; font-size: 0.8rem; margin-top: 10px; text-transform: uppercase; }
        .slogan { font-family: 'Playfair Display'; font-style: italic; font-size: 1.1rem; margin-top: 15px; color: var(--gold); }

        .main-nav { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; max-width: 800px; width: 100%; margin-top: 40px; }
        @media (max-width: 600px) { .main-nav { grid-template-columns: 1fr; } }

        .category-card { 
            background: var(--white); padding: 50px 20px; font-family: 'Playfair Display', serif; 
            font-size: 1.6rem; cursor: pointer; transition: 0.4s; box-shadow: var(--shadow);
            border-radius: 2px;
        }
        .category-card:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0,0,0,0.08); color: var(--gold); }

        /* ממשק עריכה */
        #editor-screen { display: none; padding: 40px 20px; max-width: 1300px; margin: 0 auto; grid-template-columns: 420px 1fr; gap: 50px; }
        @media (max-width: 1000px) {
            #editor-screen { grid-template-columns: 1fr; padding-top: 80px; }
            #viz-box { order: -1; height: 320px !important; position: relative !important; top: 0 !important; }
        }

        .ui-panel { background: var(--white); padding: 35px; box-shadow: var(--shadow); border-radius: 4px; }
        .back-btn { position: fixed; left: 20px; top: 20px; background: var(--white); border: 1px solid #ddd; padding: 10px 20px; cursor: pointer; z-index: 1000; transition: 0.3s; }
        .back-btn:hover { background: var(--text); color: white; }

        #viz-box { width: 100%; height: 550px; position: sticky; top: 40px; cursor: grab; }
        
        .section-title { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: #999; margin: 25px 0 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; display: block; }
        .options-grid { display: flex; flex-wrap: wrap; gap: 8px; }
        .opt-card { border: 1px solid #eee; padding: 12px; text-align: center; background: #fff; font-size: 0.85rem; flex: 1; min-width: 80px; cursor: pointer; transition: 0.3s; display: block; }
        input:checked + .opt-card { border-color: var(--gold); color: var(--gold); background: #fdfbf8; font-weight: 600; }

        .final-price { font-size: 2.8rem; font-family: 'Playfair Display'; margin: 30px 0; text-align: center; color: #333; }
        .btn-order { background: var(--text); color: #fff; width: 100%; padding: 20px; border: none; font-size: 1rem; cursor: pointer; letter-spacing: 1px; transition: 0.3s; }
        .btn-order:hover { background: #444; }

        textarea { width: 100%; height: 80px; border: 1px solid #eee; padding: 12px; box-sizing: border-box; font-family: inherit; resize: none; outline: none; border-radius: 4px; }
        .ai-btn { width: 100%; padding: 12px; background: var(--gold); color: white; border: none; cursor: pointer; font-weight: 600; margin-top: 10px; transition: 0.3s; }
        .ai-btn:hover { background: #b08d4a; }

        footer { margin-top: 60px; padding: 20px; text-align: center; opacity: 0.4; font-size: 0.75rem; width: 100%; border-top: 1px solid #eee; }
        
        /* כיווניות שפה */
        body.en { direction: ltr; }
        body.he { direction: rtl; }
        body.en .back-btn { left: auto; right: 20px; }
        body.en .lang-switch { right: auto; left: 20px; }
    </style>
</head>
